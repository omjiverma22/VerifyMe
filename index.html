<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KYC Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <nav > <h1>Verify me</h1>
    <p > open your accout -it take about 3 min</p><div style="height: 10px; width: 10px; background-color:green; " ></div></nav>

<div class="wrapper">

    <div class="form-card">

        <div class="steps">

            <div class="step active">
                1 · IDENTITY
            </div>

            <div class="step">
                2 · ADDRESS & INCOME
            </div>

            <div class="step">
                3 · DOCUMENTS
            </div>

        </div>

        <div class="progress progress-custom">
            <div class="progress-bar progress-green"></div>
        </div>

        <form>

            <div class="mb-4">
                <input
                    type="text"
                    class="form-control custom-input"
                    placeholder="Full legal name">
            </div>

            <div class="mb-4">
                <input
                    type="email"
                    class="form-control custom-input"
                    placeholder="Email address">
            </div>

            <div class="mb-3">
                <label class="field-label">
                    Mobile number
                </label>

                <div class="input-group phone-group">

                    <span class="input-group-text code-box">
                        +91
                    </span>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="10-digit mobile">

                </div>
            </div>

            <div class="mb-4">

                <label class="field-label">
                    PAN
                </label>

                <div class="input-group phone-group">

                    <span class="input-group-text icon-box">
                        🪪
                    </span>

                    <input
                        type="text"
                        class="form-control"
                        value="ABCDE1234F">

                </div>

            </div>

            <div class="btn-row">

                <button
                    type="button"
                    class="btn btn-back">
                    Back
                </button>

                <button
                    type="submit"
                    class="btn btn-continue">
                    Continue
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>
